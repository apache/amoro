# Build and publish Docker images (caller passes inputs.tag).
#
# Tag rules:
# - tag matches vX.X.X -> :latest and :<tag>
# - any other tag      -> :<tag>-latest and :<tag>

name: Publish Docker Image

on:
  workflow_call:
    inputs:
      tag:
        description: 'Version tag for the image (e.g. v1.0.0).'
        type: string
        required: true
    # Use org-level or repo-level secrets; caller must pass with secrets: inherit
    secrets:
      DOCKER_USERNAME:
        description: 'Docker Hub username (org or repo secret)'
        required: true
      DOCKER_PASSWORD:
        description: 'Docker Hub password or token (org or repo secret)'
        required: true


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-fusion:
    name: Push Fusion Docker Image
    runs-on: ubuntu-latest
    environment: docker publish
    if: ${{ startsWith(github.repository, 'datazip-inc/') }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          check-latest: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set Docker tags
        id: meta
        run: |
          INPUT_TAG="${{ inputs.tag }}"
          if [ -z "$INPUT_TAG" ]; then echo "::error::inputs.tag is empty"; exit 1; fi
          if echo "$INPUT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            if [ "${{ github.ref }}" != "refs/heads/master" ] && [ "${{ github.event_name }}" != "release" ]; then
              echo "::error::Tag $INPUT_TAG (vX.X.X) is only allowed on master branch or release event (ref=${{ github.ref }})"
              exit 1
            fi
            echo "tags=olakego/fusion:latest,olakego/fusion:${INPUT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=olakego/fusion:${INPUT_TAG}-latest,olakego/fusion:${INPUT_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Print tags
        run: echo '${{ steps.meta.outputs.tags }}'

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build dist module with Maven
        run: ./mvnw clean package -pl 'dist' -am -e -DskipTests -B -ntp -Psupport-all-formats -Pno-extended-disk-storage -Pno-plugin-bin

      - name: Build and Push Fusion Docker Image to olakego/fusion
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          file: docker/amoro/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}

  docker-optimizer-spark:
    name: Push Fusion Spark Optimizer Docker Image to olakego/fusion-spark
    runs-on: ubuntu-latest
    environment: docker publish
    if: ${{ startsWith(github.repository, 'datazip-inc/') }}
    strategy:
      matrix:
        spark: [ "3.5.8" ]  # spark version supported
        scala: [ "2.13.18" ] # scala version supported
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          check-latest: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set Docker tags
        id: meta
        run: |
          INPUT_TAG="${{ inputs.tag }}"
          if [ -z "$INPUT_TAG" ]; then echo "::error::inputs.tag is empty"; exit 1; fi
          if echo "$INPUT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            if [ "${{ github.ref }}" != "refs/heads/master" ] && [ "${{ github.event_name }}" != "release" ]; then
              echo "::error::Tag $INPUT_TAG (vX.X.X) is only allowed on master branch or release event (ref=${{ github.ref }})"
              exit 1
            fi
            echo "tags=olakego/fusion-spark:latest,olakego/fusion-spark:${INPUT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=olakego/fusion-spark:${INPUT_TAG}-latest,olakego/fusion-spark:${INPUT_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Print tags
        run: echo '${{ steps.meta.outputs.tags }}'

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set optimizer spark version and extract versions
        id: versions
        run: |
          echo "SPARK_VERSION=-Dspark.version=${{ matrix.spark }}" >> $GITHUB_ENV && \
          SPARK_MAJOR_VERSION=$(echo "${{ matrix.spark }}" | cut -d. -f1-2) && \
          echo "SPARK_MAJOR_VERSION=${SPARK_MAJOR_VERSION}" >> $GITHUB_OUTPUT && \
          SCALA_BINARY_VERSION=$(echo "${{ matrix.scala }}" | cut -d. -f1-2) && \
          echo "SCALA_BINARY_VERSION=${SCALA_BINARY_VERSION}" >> $GITHUB_OUTPUT

      - name: Set ENV Amoro version
        id: version
        run: |
          AMORO_VERSION=`cat pom.xml | grep 'amoro-parent' -C 3 | grep -Eo '<version>.*</version>' | awk -F'[><]' '{print $3}'` \
          && echo "$AMORO_VERSION" \
          && echo "AMORO_VERSION=${AMORO_VERSION}" >> $GITHUB_ENV \
          && echo "AMORO_VERSION=${AMORO_VERSION}" >> $GITHUB_OUTPUT

      - name: Build optimizer module with Maven
        run: ./mvnw clean package -pl 'amoro-optimizer/amoro-optimizer-spark' -am -e ${SPARK_VERSION} -Dscala.version=${{ matrix.scala }} -Dscala.binary.version=${{ steps.versions.outputs.SCALA_BINARY_VERSION }} -DskipTests -B -ntp

      - name: Build and Push Spark Optimizer Docker Image to olakego/fusion-spark
        uses: docker/build-push-action@v4
        env:
          AMORO_VERSION: ${{ steps.version.outputs.AMORO_VERSION }}
          SPARK_MAJOR_VERSION: ${{ steps.versions.outputs.SPARK_MAJOR_VERSION }}
          SCALA_BINARY_VERSION: ${{ steps.versions.outputs.SCALA_BINARY_VERSION }}
        with:
          context: .
          push: true
          file: docker/optimizer-spark/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            SPARK_VERSION=${{ matrix.spark }}
            SPARK_JAVA_TAG=${{ matrix.spark }}-java17
            OPTIMIZER_JOB=amoro-optimizer/amoro-optimizer-spark/target/amoro-optimizer-spark-${{ env.SPARK_MAJOR_VERSION}}_${{ env.SCALA_BINARY_VERSION}}-${{ env.AMORO_VERSION }}-jar-with-dependencies.jar


