name: MCP Server CI

on:
  pull_request:
    paths:
      - 'amoro-mcp-server/**'
      - '.github/workflows/mcp-server-ci.yml'
      - '.gitignore'
      - 'pom.xml'
  push:
    paths:
      - 'amoro-mcp-server/**'
      - '.github/workflows/mcp-server-ci.yml'
      - '.gitignore'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: amoro-mcp-server
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: amoro-mcp-server/uv.lock

      - name: Install Python and dependencies
        run: uv sync --locked

      - name: Run tests and static checks
        run: |
          uv lock --check
          uv run pytest
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy

  license:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Check Apache license headers
        run: ./mvnw apache-rat:check -DskipTests
