# kind cluster configuration for local E2E testing.
# Maps AMS NodePort services to localhost for direct access.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 31630
    hostPort: 1630      # AMS REST / Dashboard
    protocol: TCP
  - containerPort: 31260
    hostPort: 1260      # AMS Table Thrift
    protocol: TCP
  - containerPort: 31261
    hostPort: 1261      # AMS Optimizing Thrift (used by Flink optimizer)
    protocol: TCP