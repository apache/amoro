process-factories:
  - name: iceberg
    enabled: true
    priority: 100
    properties:
      expire-snapshots.enabled: "true"
      expire-snapshots.interval: "1h"
      clean-orphan-files.enabled: "true"
      clean-orphan-files.interval: "1d"
      clean-dangling-delete-files.enabled: "true"
      clean-dangling-delete-files.interval: "1d"
      expire-data.enabled: "true"
      expire-data.interval: "1d"
      auto-create-tags.enabled: "true"
      auto-create-tags.interval: "1min"
      sync-hive-tables.enabled: "false"
      sync-hive-tables.interval: "10min"
      expire-process-data.runtime-data-expire-interval: "1h"
      expire-process-data.runtime-data-keep-time: "30d"
      expire-process-data.history-data-keep-time: "7d"
