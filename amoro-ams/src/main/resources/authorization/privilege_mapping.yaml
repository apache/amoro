mappings:
  - prefixes:
      - /api/ams/v1/overview
    methods:
      - GET
    resource-type: SYSTEM
    privilege: VIEW_SYSTEM

  - prefixes:
      - /api/ams/v1/catalogs
    methods:
      - GET
    resource-type: CATALOG
    privilege: VIEW_CATALOG

  - prefixes:
      - /api/ams/v1/catalogs
    methods:
      - POST
      - PUT
      - DELETE
    resource-type: CATALOG
    privilege: MANAGE_CATALOG

  - prefixes:
      - /api/ams/v1/tables
    methods:
      - GET
    resource-type: TABLE
    privilege: VIEW_TABLE

  - prefixes:
      - /api/ams/v1/tables
    methods:
      - POST
      - PUT
      - DELETE
    resource-type: TABLE
    privilege: MANAGE_TABLE

  - paths:
      - /api/ams/v1/upgrade/properties
    methods:
      - POST
      - PUT
      - DELETE
    resource-type: TABLE
    privilege: MANAGE_TABLE

  - prefixes:
      - /api/ams/v1/optimize
    methods:
      - GET
    resource-type: OPTIMIZER
    privilege: VIEW_OPTIMIZER

  - prefixes:
      - /api/ams/v1/optimize
    methods:
      - POST
      - PUT
      - DELETE
    resource-type: OPTIMIZER
    privilege: MANAGE_OPTIMIZER

  - prefixes:
      - /api/ams/v1/terminal
    methods:
      - GET
      - POST
      - PUT
    resource-type: TERMINAL
    privilege: EXECUTE_SQL

  - prefixes:
      - /api/ams/v1/files
      - /api/ams/v1/settings
      - /api/ams/v1/api/token
    resource-type: PLATFORM
    privilege: MANAGE_PLATFORM
